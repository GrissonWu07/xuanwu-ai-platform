version: "3"
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    networks:
      - default
    ports:
      - "1883:1883"

  xuanwu-portal:
    build:
      context: .
      dockerfile: main/xuanwu-portal/Dockerfile
    container_name: xuanwu-portal
    restart: always
    networks:
      - default
    ports:
      - "18081:80"
    environment:
      - XUANWU_PORTAL_CONTROL_SECRET=${XUANWU_PORTAL_CONTROL_SECRET:-xuanwu-management-local-secret}
    depends_on:
      - xuanwu-management-server
      - xuanwu-iot-gateway
      - xuanwu-jobs
      - xuanwu-device-gateway

  xuanwu-device-gateway:
    image: ghcr.nju.edu.cn/GrissonWu07/ai-assist-deviceserver:server_latest
    container_name: xuanwu-device-gateway
    restart: always
    networks:
      - default
    ports:
      - "8000:8000"
      - "8003:8003"
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_MANAGEMENT_SERVER_URL=http://xuanwu-management-server:18082
      - XUANWU_MANAGEMENT_SERVER_SECRET=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_MANAGEMENT_SERVER_ENABLED=true
    volumes:
      - ./deploy/data:/opt/xuanwu-device-gateway/data
      - ./deploy/models/SenseVoiceSmall/model.pt:/opt/xuanwu-device-gateway/models/SenseVoiceSmall/model.pt
    depends_on:
      - xuanwu-management-server

  xuanwu-management-server:
    image: python:3.11-slim
    container_name: xuanwu-management-server
    restart: always
    networks:
      - default
    ports:
      - "18082:18082"
    working_dir: /opt/xuanwu-management-server
    command: >
      sh -c "pip install --no-cache-dir aiohttp pyyaml httpx && python app.py"
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_MANAGEMENT_SERVER_HOST=0.0.0.0
      - XUANWU_MANAGEMENT_SERVER_PORT=18082
      - XUANWU_MANAGEMENT_SERVER_AUTH_KEY=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_BASE_URL=${XUANWU_BASE_URL:-http://xuanwu-ai:8000}
      - XUANWU_CONTROL_PLANE_SECRET=${XUANWU_CONTROL_PLANE_SECRET:-xuanwu-management-to-xuanwu}
    volumes:
      - ./main/xuanwu-management-server:/opt/xuanwu-management-server

  xuanwu-iot-gateway:
    build:
      context: .
      dockerfile: main/xuanwu-iot-gateway/Dockerfile
    container_name: xuanwu-iot-gateway
    restart: always
    networks:
      - default
    ports:
      - "18084:18084"
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_MANAGEMENT_SERVER_URL=http://xuanwu-management-server:18082
      - XUANWU_MANAGEMENT_SERVER_SECRET=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_GATEWAY_HOST=0.0.0.0
      - XUANWU_GATEWAY_PORT=18084
    depends_on:
      - xuanwu-management-server
      - mosquitto

  xuanwu-jobs:
    image: python:3.11-slim
    container_name: xuanwu-jobs
    restart: always
    networks:
      - default
    ports:
      - "18083:18083"
    working_dir: /opt/xuanwu-jobs
    command: >
      sh -c "pip install --no-cache-dir aiohttp pyyaml httpx && python app.py"
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_JOBS_HOST=0.0.0.0
      - XUANWU_JOBS_PORT=18083
      - XUANWU_MANAGEMENT_SERVER_URL=http://xuanwu-management-server:18082
      - XUANWU_MANAGEMENT_SERVER_SECRET=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_GATEWAY_URL=http://xuanwu-iot-gateway:18084
      - XUANWU_GATEWAY_SECRET=${XUANWU_GATEWAY_SECRET:-xuanwu-management-local-secret}
      - XUANWU_DEVICE_RUNTIME_URL=http://xuanwu-device-gateway:8003
      - XUANWU_DEVICE_RUNTIME_SECRET=${XUANWU_DEVICE_RUNTIME_SECRET:-xuanwu-management-local-secret}
      - XUANWU_JOBS_BATCH_SIZE=100
      - XUANWU_JOBS_POLL_INTERVAL_SECONDS=2
    volumes:
      - ./main/xuanwu-jobs:/opt/xuanwu-jobs
    depends_on:
      - xuanwu-management-server
      - xuanwu-iot-gateway
      - xuanwu-device-gateway

networks:
  default:
