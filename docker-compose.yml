version: "3"
services:
  postgres:
    image: postgres:16
    container_name: postgres
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql.log
      - -c
      - log_truncate_on_rotation=on
      - -c
      - log_rotation_age=1d
      - -c
      - log_rotation_size=10MB
    restart: always
    networks:
      - default
    environment:
      - POSTGRES_DB=${XUANWU_PG_DB:-xuanwu_platform}
      - POSTGRES_USER=${XUANWU_PG_USER:-xuanwu}
      - POSTGRES_PASSWORD=${XUANWU_PG_PASSWORD:-xuanwu_local_password}
    volumes:
      - ./deploy/data/pg:/var/lib/postgresql/data
      - ./deploy/logs/postgres:/var/log/postgresql

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    networks:
      - default
    ports:
      - "1883:1883"
    volumes:
      - ./deploy/config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./deploy/logs/mosquitto:/mosquitto/log

  xuanwu-portal:
    build:
      context: .
      dockerfile: main/xuanwu-portal/Dockerfile
    container_name: xuanwu-portal
    restart: always
    networks:
      - default
    ports:
      - "18081:80"
    environment:
      - XUANWU_PORTAL_CONTROL_SECRET=${XUANWU_PORTAL_CONTROL_SECRET:-xuanwu-management-local-secret}
    volumes:
      - ./deploy/logs/portal:/var/log/nginx
    depends_on:
      - xuanwu-management-server
      - xuanwu-iot-gateway
      - xuanwu-jobs
      - xuanwu-device-gateway

  xuanwu-device-gateway:
    image: ghcr.nju.edu.cn/GrissonWu07/ai-assist-deviceserver:server_latest
    container_name: xuanwu-device-gateway
    restart: always
    networks:
      - default
    ports:
      - "8000:8000"
      - "8003:8003"
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_MANAGEMENT_SERVER_URL=http://xuanwu-management-server:18082
      - XUANWU_MANAGEMENT_SERVER_SECRET=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_MANAGEMENT_SERVER_ENABLED=true
    volumes:
      - ./deploy/data/device-gateway:/opt/xuanwu-device-gateway/data
      - ./deploy/models/SenseVoiceSmall/model.pt:/opt/xuanwu-device-gateway/models/SenseVoiceSmall/model.pt
      - ./deploy/logs/device-gateway:/opt/xuanwu-device-gateway/tmp
    depends_on:
      - xuanwu-management-server

  xuanwu-management-server:
    image: python:3.11-slim
    container_name: xuanwu-management-server
    restart: always
    networks:
      - default
    ports:
      - "18082:18082"
    working_dir: /opt/xuanwu-management-server
    command: >
      sh -c "mkdir -p /opt/logs &&
      pip install --no-cache-dir aiohttp pyyaml httpx sqlalchemy psycopg[binary] &&
      python app.py >> /opt/logs/management-server.log 2>&1"
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_MANAGEMENT_SERVER_HOST=0.0.0.0
      - XUANWU_MANAGEMENT_SERVER_PORT=18082
      - XUANWU_MANAGEMENT_SERVER_AUTH_KEY=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_BASE_URL=${XUANWU_BASE_URL:-http://xuanwu-ai:8000}
      - XUANWU_CONTROL_PLANE_SECRET=${XUANWU_CONTROL_PLANE_SECRET:-xuanwu-management-to-xuanwu}
      - XUANWU_PG_HOST=${XUANWU_PG_HOST:-postgres}
      - XUANWU_PG_PORT=${XUANWU_PG_PORT:-5432}
      - XUANWU_PG_DB=${XUANWU_PG_DB:-xuanwu_platform}
      - XUANWU_PG_USER=${XUANWU_PG_USER:-xuanwu}
      - XUANWU_PG_PASSWORD=${XUANWU_PG_PASSWORD:-xuanwu_local_password}
      - XUANWU_MGMT_PG_SCHEMA=${XUANWU_MGMT_PG_SCHEMA:-xw_mgmt}
    volumes:
      - ./main/xuanwu-management-server:/opt/xuanwu-management-server
      - ./deploy/logs/management-server:/opt/logs
    depends_on:
      - postgres

  xuanwu-iot-gateway:
    build:
      context: .
      dockerfile: main/xuanwu-iot-gateway/Dockerfile
    container_name: xuanwu-iot-gateway
    restart: always
    networks:
      - default
    ports:
      - "18084:18084"
    command: >
      sh -c "mkdir -p /opt/logs &&
      python app.py >> /opt/logs/iot-gateway.log 2>&1"
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_MANAGEMENT_SERVER_URL=http://xuanwu-management-server:18082
      - XUANWU_MANAGEMENT_SERVER_SECRET=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_GATEWAY_HOST=0.0.0.0
      - XUANWU_GATEWAY_PORT=18084
      - XUANWU_PG_HOST=${XUANWU_PG_HOST:-postgres}
      - XUANWU_PG_PORT=${XUANWU_PG_PORT:-5432}
      - XUANWU_PG_DB=${XUANWU_PG_DB:-xuanwu_platform}
      - XUANWU_PG_USER=${XUANWU_PG_USER:-xuanwu}
      - XUANWU_PG_PASSWORD=${XUANWU_PG_PASSWORD:-xuanwu_local_password}
      - XUANWU_IOT_PG_SCHEMA=${XUANWU_IOT_PG_SCHEMA:-xw_iot}
    depends_on:
      - postgres
      - xuanwu-management-server
      - mosquitto
    volumes:
      - ./deploy/logs/iot-gateway:/opt/logs

  xuanwu-jobs:
    image: python:3.11-slim
    container_name: xuanwu-jobs
    restart: always
    networks:
      - default
    ports:
      - "18083:18083"
    working_dir: /opt/xuanwu-jobs
    command: >
      sh -c "mkdir -p /opt/logs &&
      pip install --no-cache-dir aiohttp pyyaml httpx &&
      python app.py >> /opt/logs/jobs.log 2>&1"
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_JOBS_HOST=0.0.0.0
      - XUANWU_JOBS_PORT=18083
      - XUANWU_MANAGEMENT_SERVER_URL=http://xuanwu-management-server:18082
      - XUANWU_MANAGEMENT_SERVER_SECRET=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_GATEWAY_URL=http://xuanwu-iot-gateway:18084
      - XUANWU_GATEWAY_SECRET=${XUANWU_GATEWAY_SECRET:-xuanwu-management-local-secret}
      - XUANWU_DEVICE_RUNTIME_URL=http://xuanwu-device-gateway:8003
      - XUANWU_DEVICE_RUNTIME_SECRET=${XUANWU_DEVICE_RUNTIME_SECRET:-xuanwu-management-local-secret}
      - XUANWU_JOBS_BATCH_SIZE=100
      - XUANWU_JOBS_POLL_INTERVAL_SECONDS=2
    volumes:
      - ./main/xuanwu-jobs:/opt/xuanwu-jobs
      - ./deploy/logs/jobs:/opt/logs
    depends_on:
      - xuanwu-management-server
      - xuanwu-iot-gateway
      - xuanwu-device-gateway

networks:
  default:
