version: "3"
services:
  postgres:
    image: postgres:16
    container_name: postgres
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql.log
      - -c
      - log_truncate_on_rotation=on
      - -c
      - log_rotation_age=1d
      - -c
      - log_rotation_size=10MB
    restart: always
    networks:
      - default
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_DB=${XUANWU_PG_DB:-xuanwu_platform}
      - POSTGRES_USER=${XUANWU_PG_USER:-xuanwu}
      - POSTGRES_PASSWORD=${XUANWU_PG_PASSWORD:-xuanwu_local_password}
    volumes:
      - ./deploy/data/pg:/var/lib/postgresql/data
      - ./deploy/logs/postgres:/var/log/postgresql

  xuanwu-management-server:
    image: python:3.11-slim
    container_name: xuanwu-management-server
    restart: always
    networks:
      - default
    ports:
      - "18082:18082"
    working_dir: /opt/xuanwu-management-server
    command: >
      sh -c "mkdir -p /opt/logs &&
      pip install --no-cache-dir aiohttp pyyaml httpx sqlalchemy psycopg[binary] &&
      python app.py >> /opt/logs/management-server.log 2>&1"
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_MANAGEMENT_SERVER_HOST=0.0.0.0
      - XUANWU_MANAGEMENT_SERVER_PORT=18082
      - XUANWU_MANAGEMENT_SERVER_AUTH_KEY=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_BASE_URL=${XUANWU_BASE_URL:-http://xuanwu-ai:8000}
      - XUANWU_CONTROL_PLANE_SECRET=${XUANWU_CONTROL_PLANE_SECRET:-xuanwu-management-to-xuanwu}
      - XUANWU_PG_HOST=${XUANWU_PG_HOST:-postgres}
      - XUANWU_PG_PORT=${XUANWU_PG_PORT:-5432}
      - XUANWU_PG_DB=${XUANWU_PG_DB:-xuanwu_platform}
      - XUANWU_PG_USER=${XUANWU_PG_USER:-xuanwu}
      - XUANWU_PG_PASSWORD=${XUANWU_PG_PASSWORD:-xuanwu_local_password}
      - XUANWU_MGMT_PG_SCHEMA=${XUANWU_MGMT_PG_SCHEMA:-xw_mgmt}
    volumes:
      - ./main/xuanwu-management-server:/opt/xuanwu-management-server
      - ./deploy/logs/management-server:/opt/logs
    depends_on:
      - postgres

  xuanwu-device-gateway:
    image: ghcr.nju.edu.cn/GrissonWu07/ai-assist-deviceserver:server_latest
    container_name: xuanwu-device-gateway
    restart: always
    networks:
      - default
    ports:
      - "8000:8000"
      - "8003:8003"
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
      - XUANWU_MANAGEMENT_SERVER_URL=http://xuanwu-management-server:18082
      - XUANWU_MANAGEMENT_SERVER_SECRET=${XUANWU_MANAGEMENT_SERVER_AUTH_KEY:-xuanwu-management-local-secret}
      - XUANWU_MANAGEMENT_SERVER_ENABLED=true
    volumes:
      - ./deploy/data/device-gateway:/opt/xuanwu-device-gateway/data
      - ./deploy/models/SenseVoiceSmall/model.pt:/opt/xuanwu-device-gateway/models/SenseVoiceSmall/model.pt
      - ./deploy/logs/device-gateway:/opt/xuanwu-device-gateway/tmp
    depends_on:
      - xuanwu-management-server

networks:
  default:
